{% extends "base.html" %}
{% block head %}
  {{ super() }}
  <style type="text/css">
    .important { color: #336699; }
  </style>
{% endblock head %}
{% block content %}
	<table>
	  <thead>
	    <tr>
	      <th>The table header</th>
	      <th>The table header</th>
	    </tr>
	  </thead>
	  <tbody>
		  {% for poll in polls %}
	    <tr>
	      <td>{{ poll.id }}</td>
	      <td>{{ poll.duration }}</td>
	      <td>{{ poll.topic }}</td>
				<td><a href="/ui/polls/cancel?id={{poll.id}}">Cancel Poll</a></td>
			</tr>
		  {% endfor %}
	  </tbody>
	</table>
{% endblock content %}
